<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yours Respectfully</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>


    <a-scene>
        <a-assets>
            <img id="mycoolwall" src="../assets/src/textures/mycoolwall1.png" alt="">
            <img id="darkwood" src="../assets/src/textures/dark_wood_diff_1k.jpg" alt="">
            <img id="openingwall" src="../assets/src/textures/WALL DESIGNS/WALL DESIGNS-02.png" alt="">
            <img id="biographywall" src="../assets/src/textures/WALL DESIGNS/WALL DESIGNS-03.png" alt="">
            <img id="summarywall" src="../assets/src/textures/WALL DESIGNS/WALL DESIGNS-04.png" alt="">
            <img id="educationwall" src="../assets/src/textures/WALL DESIGNS/WALL DESIGNS-05.png" alt="">
            <img id="marriagewall" src="../assets/src/textures/WALL DESIGNS/WALL DESIGNS-06.png" alt="">
            <img id="societywall" src="../assets/src/textures/WALL DESIGNS/WALL DESIGNS-07.png" alt="">
            <img id="quotewall" src="../assets/src/textures/WALL DESIGNS/WALL DESIGNS-08.png" alt="">
            <img id="glass" src="../assets/src/textures/Texturelabs_Glass_154S.jpg" alt="">
            <a-asset-item id="3dyours" src="../assets/src/textures/WALL DESIGNS/3d-yours.gltf"></a-asset-item>
        </a-assets>
        
      
        <a-gltf-model src="#3dyours" scale="0.012 0.012 0.012" gltf-model="../assets/src/textures/WALL DESIGNS/3d-yours.gltf" rotation="0 135 0" position="-1.23847 1.94261 0.04333"></a-gltf-model>


<!-- lighting -->
       <a-light type="ambient" intensity="0.2" light="intensity: 2.08" position="3.06305 1.94581 0.46892"></a-light>

   

<!-- floor -->
        <a-plane 
            rotation="-90 0 0" 
            static-body="shape: plane" 
            material="color: brown; src: #darkwood" 
            class="floor" 
            geometry="height: 15.2; width: 11" 
            position="-1.85814 0 0">
        </a-plane>

<!-- opening wall -->
        <a-box 
            width="2.4" 
            height="3" 
            depth="0.3" 
            rotation="0 360 0" 
            position="-1.50718 1.5 0.22789" 
            color="brown"
            material="color: white; src: #openingwall" 
            static-body="shape: box">
           
        </a-box>
             
<!-- glass walls -->
        <a-box  
            height="3" 
            rotation="0 90 0" 
            position="-3.50011 1.5 -5.61333" 
            geometry="depth: 0.3; width: 4" 
            material="color: transparent; src: #glass">
        </a-box>


<!-- transition wall 1 -->  
        <a-box 
            width="6.7" 
            height="3" 
            depth="0.3" 
            rotation="0 360 0" 
            position="0 1.5 -7.45892" 
            material="color: white; src: #mycoolwall">
        </a-box>

<!-- transition wall 2 -->  
        <a-box 
            width="6.7" 
            height="3" 
            depth="0.3" 
            rotation="0 180 0" 
            position="0 1.5 7.44804" 
            material="color: white; src: #mycoolwall">
        </a-box>

<!-- biography wall -->
        <a-box 
        height="3" 
        width="4.6" 
        rotation="0 90 0" 
        position="-0.15692 1.5 -1.9233" 
        geometry="depth: 0.3" 
        material="src: #biographywall">
        </a-box>

<!-- summary wall -->
        <a-box 
        width="14.6" 
        height="3" 
        depth="2" 
        rotation="0 90 0" 
        position="3.49377 1.5 0" 
        geometry="depth: 0.3" 
        material="src: #summarywall">
        </a-box>

</a-scene>
</body>
</html>
